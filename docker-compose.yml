version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: beauty-hub-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-beautyhub}
      POSTGRES_PASSWORD: ${DB_PASS:-beautyhub123}
      POSTGRES_DB: ${DB_NAME:-beautyhub}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-beautyhub}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: beauty-hub-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: beauty-hub-backend
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${DB_USER:-beautyhub}:${DB_PASS:-beautyhub123}@postgres:5432/${DB_NAME:-beautyhub}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-supersecretkey123}
      BEPAID_MOCK: ${BEPAID_MOCK:-true}
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: sh -c "npx prisma migrate deploy && npx prisma db seed && npm run start:dev"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: beauty-hub-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
